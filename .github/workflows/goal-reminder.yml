name: Goal reminder

on:
  schedule:
    # 08:00 JST, Tuesday through Sunday.
    - cron: "0 23 * * 1-6"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Print the reminder text without posting to Slack"
        required: false
        default: "false"

jobs:
  remind:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    env:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_CHANNEL_ID: C0AUQNCULMB
      MONDAY_MESSAGE_MARKER: 今週の目標をスレッドに投稿してください
      EXPECTED_REPLY_COUNT: "3"
      DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run tests
        run: npm test

      - name: Post goal reminder
        run: npm start
